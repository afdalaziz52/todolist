<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — TUGAS.</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .task-done .task-title { text-decoration: line-through; opacity: 0.45; }
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;
      padding: 0.65rem 1.1rem; border-radius: 0.5rem;
      font-size: 0.85rem; font-weight: 600; pointer-events: none;
      transform: translateY(80px); opacity: 0;
      transition: all 0.25s ease;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    .toast-ok  { background: #14532d; color: #86efac; border: 1px solid #166534; }
    .toast-err { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
  </style>
</head>
<body class="min-h-screen bg-gray-900 text-white">

  <!-- Navbar -->
  <nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-40">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-xl font-extrabold">TUGAS<span class="text-indigo-500">.</span></span>
        <span class="text-gray-600 text-xs hidden sm:inline">Jalani Harimu dengan Terencana</span>
      </div>
      <div class="flex items-center gap-3">
        <span id="user-greeting" class="text-sm text-gray-400 hidden sm:block"></span>
        <button onclick="doLogout()"
          class="text-xs font-semibold bg-gray-700 hover:bg-red-900 text-gray-300 hover:text-red-300 px-3 py-1.5 rounded-lg border border-gray-600 hover:border-red-800 transition">
          Keluar
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-4 py-8 space-y-6">

    <!-- Stats -->
    <div class="grid grid-cols-3 gap-3">
      <div class="bg-gray-800 rounded-xl p-4 text-center border border-gray-700">
        <div id="total-count" class="text-2xl font-bold text-indigo-400">0</div>
        <div class="text-xs text-gray-500 mt-1 uppercase tracking-wider font-medium">Total</div>
      </div>
      <div class="bg-gray-800 rounded-xl p-4 text-center border border-gray-700">
        <div id="done-count" class="text-2xl font-bold text-green-400">0</div>
        <div class="text-xs text-gray-500 mt-1 uppercase tracking-wider font-medium">Selesai</div>
      </div>
      <div class="bg-gray-800 rounded-xl p-4 text-center border border-gray-700">
        <div id="left-count" class="text-2xl font-bold text-yellow-400">0</div>
        <div class="text-xs text-gray-500 mt-1 uppercase tracking-wider font-medium">Sisa</div>
      </div>
    </div>

    <!-- Progress -->
    <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
      <div class="flex justify-between mb-2">
        <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Progres Hari Ini</span>
        <span id="progress-pct" class="text-xs font-bold text-indigo-400">0%</span>
      </div>
      <div class="h-2 bg-gray-700 rounded-full overflow-hidden">
        <div id="progress-fill" class="h-2 bg-indigo-500 rounded-full transition-all duration-500" style="width:0%"></div>
      </div>
    </div>

    <!-- Input Form -->
    <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 space-y-3">
      <div class="flex gap-2">
        <input id="task-input" type="text" placeholder="Tulis tugas baru..." maxlength="120"
          class="flex-1 rounded-lg bg-gray-700 border border-gray-600 px-3.5 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition"/>
        <select id="cat-select" onchange="onCatChange()"
          class="rounded-lg bg-gray-700 border border-gray-600 px-3 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition">
          <option value="work">💼 Kerja</option>
          <option value="study">📚 Belajar</option>
          <option value="personal" selected>🧍 Personal</option>
          <option value="finance">💰 Keuangan</option>
          <option value="social">👥 Sosial</option>
          <option value="other">📌 Lainnya</option>
        </select>
      </div>
      <div id="custom-wrap" class="hidden">
        <input id="custom-input" type="text" placeholder="Nama kategori kustom..." maxlength="50"
          class="w-full rounded-lg bg-gray-700 border border-gray-600 px-3.5 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition"/>
      </div>
      <button onclick="addTask()"
        class="w-full rounded-lg bg-indigo-600 hover:bg-indigo-500 px-4 py-2.5 text-sm font-semibold text-white transition">
        + Tambah Tugas
      </button>
    </div>

    <!-- Filter -->
    <div class="flex gap-2">
      <button data-filter="semua" onclick="setFilter('semua',this)"
        class="filter-btn flex-1 rounded-lg py-2 text-sm font-semibold transition bg-indigo-600 text-white">Semua</button>
      <button data-filter="aktif" onclick="setFilter('aktif',this)"
        class="filter-btn flex-1 rounded-lg py-2 text-sm font-semibold transition bg-gray-800 text-gray-400 hover:bg-gray-700 border border-gray-700">Aktif</button>
      <button data-filter="selesai" onclick="setFilter('selesai',this)"
        class="filter-btn flex-1 rounded-lg py-2 text-sm font-semibold transition bg-gray-800 text-gray-400 hover:bg-gray-700 border border-gray-700">Selesai</button>
    </div>

    <!-- Loading -->
    <div id="loading-state" class="flex justify-center py-10">
      <span class="text-gray-600 text-sm animate-pulse">Memuat tugas...</span>
    </div>

    <!-- Task list -->
    <div id="task-list" class="hidden space-y-2"></div>

    <!-- Empty -->
    <div id="empty-state" class="hidden flex-col items-center py-14">
      <div class="text-5xl text-gray-700 mb-3">◻</div>
      <p class="text-gray-500 font-medium">Tidak ada tugas di sini.</p>
      <p class="text-gray-700 text-sm mt-1">Yuk tambahkan tugas baru!</p>
    </div>

    <!-- Clear done -->
    <div class="flex justify-end">
      <button onclick="clearDone()"
        class="text-xs font-medium text-gray-600 hover:text-red-400 border border-gray-800 hover:border-red-900 bg-gray-800 hover:bg-red-950 px-4 py-2 rounded-lg transition">
        🗑 Hapus semua yang selesai
      </button>
    </div>

  </main>

  <!-- Edit Modal -->
  <div id="edit-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 px-4" onclick="onModalBackdrop(event)">
    <div class="bg-gray-800 border border-gray-700 rounded-2xl p-6 w-full max-w-md shadow-2xl space-y-3">
      <h3 class="text-base font-bold text-white mb-1">Edit Tugas</h3>
      <input id="edit-title" type="text" maxlength="120"
        class="w-full rounded-lg bg-gray-700 border border-gray-600 px-3.5 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition"/>
      <select id="edit-cat" onchange="onEditCatChange()"
        class="w-full rounded-lg bg-gray-700 border border-gray-600 px-3 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition">
        <option value="work">💼 Kerja</option>
        <option value="study">📚 Belajar</option>
        <option value="personal">🧍 Personal</option>
        <option value="finance">💰 Keuangan</option>
        <option value="social">👥 Sosial</option>
        <option value="other">📌 Lainnya</option>
      </select>
      <div id="edit-custom-wrap" class="hidden">
        <input id="edit-custom" type="text" placeholder="Nama kategori kustom..." maxlength="50"
          class="w-full rounded-lg bg-gray-700 border border-gray-600 px-3.5 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition"/>
      </div>
      <div class="flex gap-2 pt-1">
        <button onclick="closeModal()"
          class="flex-1 rounded-lg bg-gray-700 hover:bg-gray-600 px-4 py-2.5 text-sm font-semibold text-gray-300 transition">Batal</button>
        <button onclick="saveEdit()"
          class="flex-1 rounded-lg bg-indigo-600 hover:bg-indigo-500 px-4 py-2.5 text-sm font-semibold text-white transition">Simpan</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const API = '/api/tasks';
    let tasks = [], currentFilter = 'semua', editingId = null;

    const CAT_LABEL = { work:'Kerja', study:'Belajar', personal:'Personal', finance:'Keuangan', social:'Sosial', other:'Lainnya' };
    const CAT_COLOR = {
      work:     'bg-blue-900 text-blue-300',
      study:    'bg-purple-900 text-purple-300',
      personal: 'bg-emerald-900 text-emerald-300',
      finance:  'bg-amber-900 text-amber-300',
      social:   'bg-pink-900 text-pink-300',
      other:    'bg-gray-700 text-gray-300',
    };

    // ── Auth guard ───────────────────────────────────────────
    const token = localStorage.getItem('token');
    if (!token) location.href = '/login.html';

    try {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      if (user.name) document.getElementById('user-greeting').textContent = '👤 ' + user.name;
    } catch {}

    function authH() {
      return { 'Content-Type':'application/json', 'Authorization':'Bearer '+token };
    }

    function doLogout() {
      localStorage.removeItem('token'); localStorage.removeItem('user');
      location.href = '/login.html';
    }

    // ── Cat change handlers ──────────────────────────────────
    function onCatChange() {
      document.getElementById('custom-wrap').classList.toggle('hidden', document.getElementById('cat-select').value !== 'other');
    }
    function onEditCatChange() {
      document.getElementById('edit-custom-wrap').classList.toggle('hidden', document.getElementById('edit-cat').value !== 'other');
    }

    // ── Load tasks ───────────────────────────────────────────
    async function loadTasks() {
      show('loading-state'); hide('task-list'); hide('empty-state');
      try {
        const res = await fetch(API, { headers: authH() });
        if (res.status === 401) { doLogout(); return; }
        if (!res.ok) throw new Error('Gagal memuat tugas');
        const data = await res.json();
        tasks = data.data || [];
        render();
      } catch(e) { toast('⚠️ ' + e.message, 'err'); }
      finally { hide('loading-state'); }
    }

    // ── Add task ─────────────────────────────────────────────
    async function addTask() {
      const titleEl  = document.getElementById('task-input');
      const catEl    = document.getElementById('cat-select');
      const customEl = document.getElementById('custom-input');
      const title    = titleEl.value.trim();
      const category = catEl.value;

      if (!title) { toast('Tulis dulu tugasnya!', 'err'); titleEl.focus(); return; }
      if (category === 'other' && !customEl.value.trim()) {
        toast('Isi nama kategori kustom!', 'err'); customEl.focus(); return;
      }

      const body = { title, category };
      if (category === 'other') body.custom_category = customEl.value.trim();

      try {
        const res  = await fetch(API, { method:'POST', headers:authH(), body:JSON.stringify(body) });
        if (res.status === 401) { doLogout(); return; }
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Gagal menambah tugas');
        titleEl.value = ''; customEl.value = '';
        document.getElementById('custom-wrap').classList.add('hidden');
        toast('✅ Tugas ditambahkan!');
        await loadTasks();
      } catch(e) { toast('⚠️ '+e.message,'err'); }
    }

    // ── Toggle status ────────────────────────────────────────
    async function toggleTask(id) {
      const t = tasks.find(x => x.id === id); if (!t) return;
      const newStatus = t.status === 'done' ? 'pending' : 'done';
      try {
        const res = await fetch(`${API}/${id}/status`, {
          method:'PATCH', headers:authH(), body:JSON.stringify({ status:newStatus })
        });
        if (res.status===401) { doLogout(); return; }
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        t.status = newStatus;
        render();
        toast(newStatus==='done' ? '✅ Selesai!' : '↩ Belum selesai');
      } catch(e) { toast('⚠️ '+e.message,'err'); }
    }

    // ── Delete task ──────────────────────────────────────────
    async function deleteTask(id) {
      if (!confirm('Hapus tugas ini?')) return;
      try {
        const res = await fetch(`${API}/${id}`, { method:'DELETE', headers:authH() });
        if (res.status===401) { doLogout(); return; }
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        tasks = tasks.filter(x => x.id !== id);
        render();
        toast('🗑 Tugas dihapus');
      } catch(e) { toast('⚠️ '+e.message,'err'); }
    }

    // ── Edit ─────────────────────────────────────────────────
    function openEdit(id) {
      const t = tasks.find(x => x.id===id); if(!t) return;
      editingId = id;
      document.getElementById('edit-title').value = t.title;
      document.getElementById('edit-cat').value   = t.category;
      const isOther = t.category === 'other';
      document.getElementById('edit-custom-wrap').classList.toggle('hidden', !isOther);
      document.getElementById('edit-custom').value = isOther ? (t.custom_category||'') : '';
      show('edit-modal');
      setTimeout(() => document.getElementById('edit-title').focus(), 50);
    }
    function closeModal() { editingId=null; hide('edit-modal'); }
    function onModalBackdrop(e) { if(e.target===document.getElementById('edit-modal')) closeModal(); }

    async function saveEdit() {
      const title    = document.getElementById('edit-title').value.trim();
      const category = document.getElementById('edit-cat').value;
      const customEl = document.getElementById('edit-custom');
      if (!title) { toast('Judul wajib diisi!','err'); return; }
      if (category==='other' && !customEl.value.trim()) { toast('Isi kategori kustom!','err'); return; }
      const body = { title, category };
      if (category==='other') body.custom_category = customEl.value.trim();
      try {
        const res  = await fetch(`${API}/${editingId}`, { method:'PATCH', headers:authH(), body:JSON.stringify(body) });
        if (res.status===401) { doLogout(); return; }
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        closeModal();
        toast('✏️ Tugas diperbarui!');
        await loadTasks();
      } catch(e) { toast('⚠️ '+e.message,'err'); }
    }

    // ── Clear done ───────────────────────────────────────────
    async function clearDone() {
      const done = tasks.filter(t => t.status==='done');
      if (!done.length) { toast('Tidak ada tugas selesai', 'err'); return; }
      if (!confirm(`Hapus ${done.length} tugas yang selesai?`)) return;
      let cnt = 0;
      for (const t of done) {
        try {
          const r = await fetch(`${API}/${t.id}`, { method:'DELETE', headers:authH() });
          if (r.ok) { tasks = tasks.filter(x => x.id!==t.id); cnt++; }
        } catch {}
      }
      render();
      toast(`🗑 ${cnt} tugas dihapus`);
    }

    // ── Filter ───────────────────────────────────────────────
    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => {
        const active = b.dataset.filter === f;
        b.className = 'filter-btn flex-1 rounded-lg py-2 text-sm font-semibold transition ' +
          (active ? 'bg-indigo-600 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 border border-gray-700');
      });
      render();
    }

    // ── Render ───────────────────────────────────────────────
    function render() {
      const total = tasks.length;
      const done  = tasks.filter(t => t.status==='done').length;
      const left  = total - done;
      const pct   = total===0 ? 0 : Math.round(done/total*100);

      document.getElementById('total-count').textContent = total;
      document.getElementById('done-count').textContent  = done;
      document.getElementById('left-count').textContent  = left;
      document.getElementById('progress-pct').textContent = pct+'%';
      document.getElementById('progress-fill').style.width = pct+'%';

      let filtered = tasks;
      if (currentFilter==='aktif')   filtered = tasks.filter(t => t.status!=='done');
      if (currentFilter==='selesai') filtered = tasks.filter(t => t.status==='done');

      const list  = document.getElementById('task-list');
      const empty = document.getElementById('empty-state');

      if (!filtered.length) {
        hide('task-list'); list.innerHTML='';
        empty.style.display='flex'; empty.classList.remove('hidden');
        return;
      }
      hide('loading-state');
      empty.style.display='none'; empty.classList.add('hidden');
      show('task-list');

      list.innerHTML = filtered.map(t => {
        const isDone    = t.status === 'done';
        const catLabel  = t.custom_category || CAT_LABEL[t.category] || t.category;
        const catColor  = CAT_COLOR[t.category] || CAT_COLOR.other;
        const dateStr   = t.created_at
          ? new Date(t.created_at).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})
          : '';
        return `
        <div class="task-item ${isDone?'task-done':''} group flex items-start gap-3 bg-gray-800 hover:bg-gray-750 border border-gray-700 hover:border-gray-600 rounded-xl px-4 py-3 transition" data-id="${t.id}">
          <button onclick="toggleTask(${t.id})" title="${isDone?'Tandai belum selesai':'Tandai selesai'}"
            class="mt-0.5 flex-shrink-0 w-5 h-5 rounded-full border-2 flex items-center justify-center transition
              ${isDone ? 'bg-green-500 border-green-500' : 'border-gray-500 hover:border-indigo-400'}">
            ${isDone ? '<svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' : ''}
          </button>
          <div class="flex-1 min-w-0">
            <p class="task-title text-sm font-medium text-white leading-snug">${esc(t.title)}</p>
            <div class="flex items-center gap-2 mt-1.5 flex-wrap">
              <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold ${catColor}">${esc(catLabel)}</span>
              ${dateStr ? `<span class="text-gray-600 text-xs">${dateStr}</span>` : ''}
            </div>
          </div>
          <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition flex-shrink-0 mt-0.5">
            <button onclick="openEdit(${t.id})" title="Edit"
              class="p-1.5 rounded-lg text-gray-500 hover:text-indigo-400 hover:bg-gray-700 transition text-xs">✏️</button>
            <button onclick="deleteTask(${t.id})" title="Hapus"
              class="p-1.5 rounded-lg text-gray-500 hover:text-red-400 hover:bg-gray-700 transition text-xs">✕</button>
          </div>
        </div>`;
      }).join('');
    }

    // ── Toast ────────────────────────────────────────────────
    function toast(msg, type='ok') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'show ' + (type==='err' ? 'toast-err' : 'toast-ok');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), 2600);
    }

    // ── Helpers ──────────────────────────────────────────────
    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
    function esc(s)   { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // ── Init ─────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('task-input').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });
      document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
      loadTasks();
    });
  </script>
</body>
</html>
